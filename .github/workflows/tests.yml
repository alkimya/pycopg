name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      postgres:
        image: timescale/timescaledb-ha:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Set up test database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE pycopg_test;"
          psql -h localhost -U postgres -d pycopg_test -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -h localhost -U postgres -d pycopg_test -c "CREATE EXTENSION IF NOT EXISTS timescaledb;"

      - name: Run tests
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGPORT: "5432"
        run: uv run pytest

      - name: Check docstring coverage
        run: uv run interrogate pycopg --fail-under 95 --quiet

      - name: Build Sphinx docs (napoleon non-regression)
        run: |
          uv pip install -r docs/requirements.txt
          uv run sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: mypy type check
        continue-on-error: true
        run: uv run mypy pycopg/
